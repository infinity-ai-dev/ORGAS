version: '3.8'

# ============================================================================
# ORGAS AI - Production Docker Compose Configuration
# Using Real Data: app.orgahold.com infrastructure
# ============================================================================
# This configuration is based on production values provided
# Services: Frontend, Backend API, AI Agents, Redis, Supabase DB
# Network: portainer_default (Traefik managed)
# ============================================================================

services:

  # ============================================================================
  # FRONTEND SERVICE - Next.js
  # ============================================================================
  orgas-frontend:
    image: paxley/orgas-app:2.0.1-test
    container_name: orgas-frontend-prod
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=https://app.orgahold.com
      - VITE_API_PREFIX=/api
      - VITE_FRONTEND_PROXY_SECRET=OIEeZDZOzrCUiVwiswMoMvVHmN3sBj8OQR0ozIndbahL
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        labels: "service=orgas-frontend,version=2.0.1"
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=portainer_default"
        - "traefik.http.routers.orgas-frontend.entrypoints=websecure"
        - "traefik.http.routers.orgas-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.orgas-frontend.loadbalancer.server.port=80"
        - "traefik.http.routers.orgas-frontend.rule=Host(`app.orgahold.com`) && !PathPrefix(`/api`)"
        - "traefik.http.routers.orgas-frontend.priority=1"
    networks:
      - portainer_default
    restart: unless-stopped

  # ============================================================================
  # BACKEND API SERVICE - Express/TypeScript
  # ============================================================================
  orgas-api:
    image: paxley/orgas-api:2.0.2-test
    container_name: orgas-api-prod
    environment:
      # Environment
      - NODE_ENV=production
      - PORT=3000
      - AGENT_FALLBACK_LOCAL=true
      - FRONTEND_URL=https://app.orgahold.com
      - FRONTEND_PROXY_SECRET=OIEeZDZOzrCUiVwiswMoMvVHmN3sBj8OQR0ozIndbahL

      # Authentication & Webhooks
      - AUTH_STATIC_TOKENS=orgas-webhook-token-2024
      - WEBHOOK_TOKEN=iQJxl1WZw7l25btvqr4u4J3QiMXLSR4EifmkpUyVB7Rf
      - VITE_WEBHOOK_TOKEN=GKLwKKRvyZkGYR1xzMvkHsDbzzXJlsRoH4IqhdLY0R73
      - JWT_SECRET_FILE=/run/secrets/JWT_SECRET

      # LLM - Gemini API (via Docker secret)
      - GEMINI_API_KEY_FILE=/run/secrets/GEMINI_API_KEY_FILE

      # Database - PostgreSQL/Supabase (Self-hosted)
      - USE_INTERNAL_PG=true
      - DB_HOST=supabase_db
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=ecdb0882661323177373c6270710e676
      - DB_SSL=false

      # HTML to PDF Conversion
      - HTML2PDF_URL=https://html2pdf.mayacrm.shop/pdf
      - HTML2PDF_API_KEY=B8zbDepY97N6XIqU

      # Cache - Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=11

      # Supabase Storage Configuration
      - SUPABASE_STORAGE_URL=https://supabase.dev.orgahold.com/storage/v1
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ewogICJyb2xlIjogInNlcnZpY2Vfcm9sZSIsCiAgImlzcyI6ICJzdXBhYmFzZSIsCiAgImlhdCI6IDE3MTUwNTA4MDAsCiAgImV4cCI6IDE4NzI4MTcyMDAKfQ._1IT1C2RZpdzHZGiAsxICtZsdOpeHDrDv13KxAQks38
      - STORAGE_CACHE_TTL=3000

      # AI Agents Service (Local)
      - AGENT_API_URL=http://orgas-ai-agents:8000/api
      - AGENT_API_KEY=${AGENT_API_KEY:-your_agent_api_key_here}
      - AGENT_API_TIMEOUT=30000

    secrets:
      - GEMINI_API_KEY_FILE
      - JWT_SECRET

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        labels: "service=orgas-api,version=2.0.2"

    depends_on:
      - redis
      - orgas-ai-agents

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        # Main API Router
        - "traefik.enable=true"
        - "traefik.docker.network=portainer_default"
        - "traefik.http.routers.orgas-api.entrypoints=websecure"
        - "traefik.http.routers.orgas-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.orgas-api.loadbalancer.server.port=3000"
        - "traefik.http.routers.orgas-api.rule=Host(`app.orgahold.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.orgas-api.priority=100"
        - "traefik.http.middlewares.orgas-api-stripprefix.stripprefix.prefixes=/api"
        - "traefik.http.routers.orgas-api.middlewares=orgas-api-stripprefix"

        # Webhook Router
        - "traefik.http.routers.orgas-api-webhook.rule=Host(`app.orgahold.com`) && Path(`/api/webhook/ai-submit`) && (Headers(`Origin`,`https://app.orgahold.com`) || HeadersRegexp(`Referer`,`^https://app\\.orgahold\\.com/`))"
        - "traefik.http.routers.orgas-api-webhook.entrypoints=websecure"
        - "traefik.http.routers.orgas-api-webhook.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.orgas-api-webhook.service=orgas-api"
        - "traefik.http.routers.orgas-api-webhook.priority=200"
        - "traefik.http.routers.orgas-api-webhook.middlewares=orgas-api-stripprefix,orgas-api-webhook-headers"
        - "traefik.http.middlewares.orgas-api-webhook-headers.headers.customrequestheaders.X-Frontend-Secret=OIEeZDZOzrCUiVwiswMoMvVHmN3sBj8OQR0ozIndbahL"

    networks:
      - portainer_default

    restart: unless-stopped

  # ============================================================================
  # AI AGENTS SERVICE - FastAPI/LangGraph/LangChain
  # ============================================================================
  orgas-ai-agents:
    image: orgas-ai-agents:3.0.0-amd64
    container_name: orgas-ai-agents-prod
    environment:
      # FastAPI Configuration
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      - DEBUG=false
      - ENVIRONMENT=production

      # Database - PostgreSQL/Supabase
      - DATABASE_URL=postgresql://postgres:ecdb0882661323177373c6270710e676@supabase_db:5432/postgres
      - DB_HOST=supabase_db
      - DB_PORT=5432
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=ecdb0882661323177373c6270710e676
      - DB_SSL=false

      # Cache - Redis
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

      # LLM APIs
      - GOOGLE_API_KEY_FILE=/run/secrets/GEMINI_API_KEY_FILE
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Agent Configuration
      - LOG_LEVEL=INFO
      - MAX_WORKERS=5
      - TIMEOUT_SECONDS=30
      - STORAGE_CACHE_TTL=3000

      # Supabase Storage
      - SUPABASE_STORAGE_URL=https://supabase.dev.orgahold.com/storage/v1
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ewogICJyb2xlIjogInNlcnZpY2Vfcm9sZSIsCiAgImlzcyI6ICJzdXBhYmFzZSIsCiAgImlhdCI6IDE3MTUwNTA4MDAsCiAgImV4cCI6IDE4NzI4MTcyMDAKfQ._1IT1C2RZpdzHZGiAsxICtZsdOpeHDrDv13KxAQks38

    secrets:
      - GEMINI_API_KEY_FILE

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        labels: "service=orgas-ai-agents,version=latest"

    volumes:
      - ./backend:/app
      - /app/__pycache__

    depends_on:
      - redis

    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=portainer_default"
        - "traefik.http.routers.orgas-ai-agents.entrypoints=websecure"
        - "traefik.http.routers.orgas-ai-agents.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.orgas-ai-agents.loadbalancer.server.port=8000"
        - "traefik.http.routers.orgas-ai-agents.rule=Host(`app.orgahold.com`) && PathPrefix(`/api/ai`)"
        - "traefik.http.routers.orgas-ai-agents.priority=50"
        - "traefik.http.middlewares.orgas-ai-agents-stripprefix.stripprefix.prefixes=/api/ai"
        - "traefik.http.routers.orgas-ai-agents.middlewares=orgas-ai-agents-stripprefix"

    networks:
      - portainer_default

    restart: unless-stopped

  # ============================================================================
  # CACHE - Redis (Shared)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: orgas-redis-prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        labels: "service=redis,version=7"
    deploy:
      restart_policy:
        condition: on-failure
    networks:
      - portainer_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# NAMED VOLUMES
# ============================================================================
volumes:
  redis_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  portainer_default:
    external: true
    name: portainer_default

# ============================================================================
# DOCKER SECRETS (Must be pre-created)
# ============================================================================
# Create with:
# echo "your_jwt_secret_here" | docker secret create JWT_SECRET -
# echo "your_gemini_api_key_here" | docker secret create GEMINI_API_KEY_FILE -
# ============================================================================
secrets:
  GEMINI_API_KEY_FILE:
    external: true
  JWT_SECRET:
    external: true
