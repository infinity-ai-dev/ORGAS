version: '3.8'

# ============================================================================
# ORGAS AI - Complete Microservice Orchestration
# ============================================================================
# Services:
# - Frontend (Next.js): infinitytools/orgas-frontend:2.0.22
# - Backend API (Express/TypeScript): infinitytools/orgas-api:2.0.44
# - AI Agents (FastAPI/LangGraph): Custom Python service
# - Database (Supabase self-hosted PostgreSQL)
# - Cache (Redis)
# - Reverse Proxy (Traefik)
# ============================================================================

services:

  # ============================================================================
  # REVERSE PROXY - Traefik
  # ============================================================================
  traefik:
    image: traefik:latest
    container_name: orgas-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orgas-network
    restart: unless-stopped

  # ============================================================================
  # DATABASE - PostgreSQL/Supabase
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: orgas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orgas-network
    restart: unless-stopped

  # ============================================================================
  # CACHE - Redis
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: orgas-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orgas-network
    restart: unless-stopped

  # ============================================================================
  # FRONTEND - Next.js Application
  # ============================================================================
  orgas-frontend:
    image: infinitytools/orgas-frontend:2.0.22
    container_name: orgas-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_AGENT_API_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - orgas-api
    networks:
      - orgas-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`) || Host(`app.orgahold.com`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ============================================================================
  # BACKEND API - Express.js/TypeScript
  # ============================================================================
  orgas-api:
    image: infinitytools/orgas-api:2.0.44
    container_name: orgas-api
    environment:
      # Express Configuration
      NODE_ENV: production
      PORT: 3000
      ENVIRONMENT: production

      # Database - Supabase
      SUPABASE_URL: https://supabase.dev.orgahold.com
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...}

      # Agent API - Python Service
      AGENT_API_URL: http://orgas-ai-agents:8000/api
      AGENT_API_KEY: ${AGENT_API_KEY:-your_agent_api_key_here}
      AGENT_API_TIMEOUT: 30000

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-f1d703439bea0516e753919188777f64806d0a45}

      # Logging
      LOG_LEVEL: info

    ports:
      - "3000:3000"

    depends_on:
      - orgas-ai-agents
      - postgres
      - redis

    networks:
      - orgas-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`) || Host(`app.orgahold.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  # ============================================================================
  # AI AGENTS SERVICE - FastAPI/LangGraph/LangChain
  # ============================================================================
  orgas-ai-agents:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: infinitytools/orgas-ai-agent:3.0.29
    container_name: orgas-ai-agents
    environment:
      # FastAPI Configuration
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-false}

      # Database - PostgreSQL
      DATABASE_URL: postgresql://${POSTGRES_USER:-supabase}:${POSTGRES_PASSWORD:-your_secure_password_here}@postgres:5432/${POSTGRES_DB:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-supabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PORT: 5432

      # Redis Cache
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}

      # LLM APIs
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Agent Configuration
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      MAX_WORKERS: 5
      TIMEOUT_SECONDS: 30

    volumes:
      - ./agent:/app
      - /app/__pycache__

    ports:
      - "${AGENTS_API_PORT:-8000}:8000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - orgas-network

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agents.rule=Host(`app.orgahold.com`) && PathPrefix(`/api/ai`)"
      - "traefik.http.routers.agents.entrypoints=web"
      - "traefik.http.services.agents.loadbalancer.server.port=8000"

  

  # ============================================================================
  # ADMIN - Redis Commander (Optional - Debug Profile)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: orgas-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis_secure_password}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
    networks:
      - orgas-network
    restart: unless-stopped
    profiles:
      - debug

# ============================================================================
# NAMED VOLUMES - Data Persistence
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================================
# NETWORKS - Service Communication
# ============================================================================
networks:
  orgas-network:
    driver: bridge
